\* TLC model config for Reconciliation.tla — ADVERSARIAL mode.
\*
\* Enables AdversarialRequest/AdversarialResponse actions. INV-10b is
\* dropped from the invariants list because the adversary deliberately
\* emits oversize pages (modeling forged responses); the protocol's
\* defense is INV-9 (cross-peer injection guard) preventing those from
\* ever being accepted. INV-8/9/10/12 must still hold.
\*
\* State space is much larger than the honest model. Bounds are
\* tightened accordingly. The honest run uses NumEntries=2; here we
\* keep it the same but drop MaxPages and MaxReqIDs to compensate.

CONSTANTS
    Peers = {p1, p2}
    NumEntries = 1
    NumTimestamps = 0
    MaxPageSize = 1
    MaxPages = 1
    MaxReqIDs = 2
    Adversarial = TRUE

INIT Init
NEXT Next

INVARIANTS
    TypeOK
    INV_RECON_9_AcceptedOnlyFromAllocatedIDs
    INV_RECON_10_PageCount

\* INV_RECON_8_AcceptedFromTrueLedger DROPPED: adversarial responders
\*   can claim entries that aren't in their actual store; defense is
\*   downstream diff classification, not a wire-level guard.
\* INV_RECON_10b_HonestResponsePageSize DROPPED: adversarial responses
\*   may exceed MaxPageSize by design.
\* INV-11 (for_peer guard) is structural in HandleRequest; TLC
\*   exercises the drop branch via AdversarialRequest but the
\*   invariant has no state predicate.

\* Run with: java ... tlc2.TLC -deadlock -workers 4 \
\*           -config Reconciliation_adversarial.cfg Reconciliation.tla
