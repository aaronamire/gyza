\* Adversarial discrimination test — tight bounds, MalleableSigs=TRUE.
\* Validates that the spec's invariants discriminate against forged
\* sigs / wrong envelope hashes / wrong amounts. Tractable in ~minutes.
\*
\* For full adversarial coverage at the default bounds, expect hours
\* of TLC runtime (see Settlement.cfg's comment).

CONSTANTS
    Peers = {p1, p2}
    EnvelopeIDs = {h1}
    EntryIDs = {e1}
    MaxAmount = 2
    MalleableSigs = TRUE

INIT Init
NEXT Next

INVARIANTS
    TypeOK
    INV_SETTLE_1_StateMachineOrdering
    INV_SETTLE_2_SigsVerifiedBeforeApply
    INV_SETTLE_3_EnvelopeResolvedBeforeApply
    INV_SETTLE_4_AmountToleranceBeforeApply
    INV_SETTLE_5_AppliedConsistencyAcrossSides
    INV_SETTLE_6_AppliedEntriesAreStable
