\* TLC model config for Attestation.tla — HONEST mode.
\*
\* Tight bounds chosen for tractable state space. The spec focuses on
\* cert-assembly correctness: the wire protocol (challenge, response,
\* nonces) is deferred to CapabilityStream.tla.

CONSTANTS
    Peers = {p1, p2, p3}
    Bodies = {b1}
    Applicant = p1
    CanonicalBody = b1
    MinCoSignatures = 2
    IssuedTier = 3
    MaxAttestationTTL = 3
    MalleableSigs = FALSE

INIT Init
NEXT Next

INVARIANTS
    TypeOK
    INV_ATT_1_MinCoSignatures
    INV_ATT_2_TierFixed
    INV_ATT_3_LifetimeBound
    INV_ATT_6_DistinctValidators
    INV_ATT_7_AllCosignSameBody
    INV_ATT_8_BodyPlausible

\* Run with:
\*   java ... tlc2.TLC -deadlock -workers 4 \
\*     -config Attestation.cfg Attestation.tla
