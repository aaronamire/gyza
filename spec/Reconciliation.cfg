\* TLC model config for Reconciliation.tla — HONEST mode.
\*
\* Bounded constants chosen for tractable state space. With these
\* values TLC explores ~10^5–10^6 reachable states in seconds–minutes.
\* The adversarial variant (Reconciliation_adversarial.cfg) flips
\* Adversarial=TRUE and enables AdversarialRequest/Response actions,
\* which blow up branching factor — budget that run as minutes.

CONSTANTS
    Peers = {p1, p2}
    NumEntries = 2
    NumTimestamps = 1
    MaxPageSize = 1
    MaxPages = 2
    MaxReqIDs = 4
    Adversarial = FALSE

INIT Init
NEXT Next

INVARIANTS
    TypeOK
    INV_RECON_8_AcceptedFromTrueLedger
    INV_RECON_9_AcceptedOnlyFromAllocatedIDs
    INV_RECON_10_PageCount
    INV_RECON_10b_HonestResponsePageSize

\* Run with: java ... tlc2.TLC -deadlock -workers 4 \
\*           -config Reconciliation.cfg Reconciliation.tla
