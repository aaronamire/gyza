\* TLC model config for Attestation.tla — ADVERSARIAL mode.
\*
\* MalleableSigs=TRUE enables AdversarialBadSig + AdversarialWrongBody.
\* Bodies has TWO elements so the wrong-body branch has somewhere to go.

CONSTANTS
    Peers = {p1, p2, p3}
    Bodies = {b1, b2}
    Applicant = p1
    CanonicalBody = b1
    MinCoSignatures = 2
    IssuedTier = 3
    MaxAttestationTTL = 3
    MalleableSigs = TRUE

INIT Init
NEXT Next

INVARIANTS
    TypeOK
    INV_ATT_1_MinCoSignatures
    INV_ATT_2_TierFixed
    INV_ATT_3_LifetimeBound
    INV_ATT_6_DistinctValidators
    INV_ATT_7_AllCosignSameBody
    INV_ATT_8_BodyPlausible

\* The adversarial check validates that:
\*   - AdversarialBadSig: cosigs with sig_valid=FALSE never enter a cert.
\*     AssembleCert's `cs.sig_valid` filter blocks them.
\*   - AdversarialWrongBody: cosigs over body != CanonicalBody never
\*     enter a CanonicalBody cert. AssembleCert's `body=CanonicalBody`
\*     filter blocks them. (INV-ATT-7 catches if it slips through.)
