\* TLC model config for Settlement.tla
\*
\* Bounded constants chosen for tractable state space. With these
\* values TLC explores ~10^5 reachable states in seconds. Increase
\* the cardinality of Peers / EnvelopeIDs / EntryIDs to deepen the
\* check at the cost of exploration time.

\* Default config: honest-only model. MalleableSigs=FALSE disables
\* the AdversarialSubmit action, which has very high branching
\* factor (Peers^2 * BOOLEAN * EnvelopeIDs * EntryIDs * Amounts).
\*
\* For adversarial coverage, swap MalleableSigs=TRUE and budget
\* hours of TLC runtime. A prior unbounded adversarial run with
\* {p1,p2,p3} / {h1,h2} / {e1,e2} explored 41M distinct states in
\* 22 minutes without finding violations of any safety invariant.
\* The state space of the adversarial model is genuinely large
\* because every multiset of in-flight forged messages produces a
\* distinct state.
CONSTANTS
    Peers = {p1, p2, p3}
    EnvelopeIDs = {h1, h2}
    EntryIDs = {e1, e2}
    MaxAmount = 4
    MalleableSigs = FALSE

\* Initial state predicate and next-state relation
INIT Init
NEXT Next

\* Type invariants and safety properties to verify.
INVARIANTS
    TypeOK
    INV_SETTLE_1_StateMachineOrdering
    INV_SETTLE_2_SigsVerifiedBeforeApply
    INV_SETTLE_3_EnvelopeResolvedBeforeApply
    INV_SETTLE_4_AmountToleranceBeforeApply
    INV_SETTLE_5_AppliedConsistencyAcrossSides
    INV_SETTLE_6_AppliedEntriesAreStable

\* NOTE: TLC's config-file format doesn't have a CHECK_DEADLOCK
\* option; pass `-deadlock` on the TLC command line to disable
\* deadlock-as-error. The spec WILL reach deadlock states (after
\* all envelopes are processed, no actions are enabled).
\*
\* Symmetry-reduction (Permutations(Peers) etc.) could shrink the
\* state space, but TLC's config format only accepts one symmetry
\* set and the syntax for unions is finicky. Skipping for now; can
\* be added if state-space exploration becomes a bottleneck.
