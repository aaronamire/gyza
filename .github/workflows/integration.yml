name: Integration (heavy)

# Heavy integration suite. Runs:
#   - nightly at 04:00 UTC (a low-traffic window)
#   - on-demand via workflow_dispatch
#   - on PRs that touch netd/, gyza/network/, or this workflow
#     itself (catches integration regressions on the changes
#     most likely to break them)
#
# These tests spawn real gyza-netd daemons. Each test costs ~1–2
# minutes wall-clock. Total suite is ~15–20 minutes warm. Excluded
# from ci.yml because every-push overhead would be excessive.

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC nightly
  workflow_dispatch:
  pull_request:
    paths:
      - 'netd/**'
      - 'gyza/network/**'
      - '.github/workflows/integration.yml'

concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Heavy integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: netd/go.sum

      - name: Build gyza-netd
        run: make -C netd build

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-all-MiniLM-L6-v2-v1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run heavy integration suite
        env:
          PYTHONUNBUFFERED: '1'
        run: |
          python -m pytest \
            tests/test_netd_client.py \
            tests/test_network_blackboard_gossip.py \
            tests/test_attestation_bridge.py \
            tests/test_verify_on_fetch.py \
            -q --tb=short --timeout=300

      - name: Integration demo (sanity check)
        run: |
          python demo/single_machine_global.py
