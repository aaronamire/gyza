name: release

# Cuts a release when a vX.Y.Z tag is pushed. Builds:
#   - gyza-netd binary for linux/amd64 and linux/arm64 (tarball each)
#   - Python wheel + sdist
# All four artifacts are uploaded to the GitHub Release for that tag.
#
# Trigger:
#   git tag v0.1.0a1 && git push origin v0.1.0a1
#
# To dry-run before a real cut, push a tag like `v0.0.0-test1` to a
# fork and watch the run.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # to create / upload to the Release

jobs:
  # ---------------------------------------------------------------------
  # Build the Go daemon for each Linux arch.
  # We cross-compile via Go itself (GOOS=linux GOARCH=...) so a single
  # runner produces both artifacts; faster + cheaper than per-arch runners.
  # ---------------------------------------------------------------------
  build-daemon:
    name: build gyza-netd (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            goarch: amd64
          - arch: arm64
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: build
        working-directory: netd
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
              -o gyza-netd ./cmd/gyza-netd/
          file gyza-netd
          ./gyza-netd --help >/dev/null 2>&1 || true
          # Sanity: arm64 binary won't run on amd64 host. We don't gate
          # on that — the file(1) line above is the proof.
      - name: package
        working-directory: netd
        run: |
          tarball="gyza-netd-${GITHUB_REF_NAME}-linux-${{ matrix.arch }}.tar.gz"
          tar -czf "$tarball" gyza-netd
          sha256sum "$tarball" > "$tarball.sha256"
          ls -la "$tarball" "$tarball.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: gyza-netd-${{ matrix.arch }}
          path: |
            netd/gyza-netd-*.tar.gz
            netd/gyza-netd-*.sha256

  # ---------------------------------------------------------------------
  # Build the Python wheel + sdist.
  # Wheel is pure-python (no compiled extensions) so one wheel works on
  # all archs. We still build sdist for users who prefer it.
  # ---------------------------------------------------------------------
  build-wheel:
    name: build python wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: install build deps
        run: python -m pip install --upgrade pip build
      - name: build
        run: python -m build
      - name: sha256
        run: |
          cd dist
          for f in *; do sha256sum "$f" > "$f.sha256"; done
          ls -la
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  # ---------------------------------------------------------------------
  # Build the self-contained `gyza` onedir binary (the one-command-install
  # artifact). Built INSIDE manylinux_2_28 via packaging/Dockerfile.build
  # so the glibc floor stays <= 2.28 (Ubuntu 20.04+/RHEL 8+). The floor is
  # asserted inside the image build (check_glibc_floor.sh), so a too-new
  # floor fails the job before anything ships — portability is a tested
  # invariant, never "works on my machine". amd64 + arm64 via native
  # runners (PyInstaller cannot cross-compile; each arch builds on its own).
  # ---------------------------------------------------------------------
  build-onedir:
    name: build self-contained gyza (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            pbs_asset: cpython-3.14.6+20260718-x86_64-unknown-linux-gnu-install_only_stripped.tar.gz
          - arch: arm64
            runner: ubuntu-24.04-arm
            pbs_asset: cpython-3.14.6+20260718-aarch64-unknown-linux-gnu-install_only_stripped.tar.gz
    steps:
      - uses: actions/checkout@v4
      - name: build onedir in manylinux (glibc floor asserted inside)
        run: |
          docker build -f packaging/Dockerfile.build \
            --build-arg PBS_ASSET=${{ matrix.pbs_asset }} \
            -t gyza-onedir-build .
          id=$(docker create gyza-onedir-build)
          mkdir -p dist
          docker cp "$id:/out/dist/gyza" dist/gyza
          docker rm "$id"
      - name: package + checksum (mandatory)
        run: |
          tarball="gyza-${GITHUB_REF_NAME}-linux-${{ matrix.arch }}.tar.gz"
          tar -czf "$tarball" -C dist gyza
          sha256sum "$tarball" > "$tarball.sha256"
          ls -la "$tarball"*
      - name: sign the tarball (minisign, if key configured)
        env:
          MINISIGN_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        if: ${{ env.MINISIGN_KEY != '' }}
        run: |
          # Signs the whole tarball => covers the entire onedir tree
          # transitively. install.sh verifies BEFORE extraction.
          sudo apt-get update && sudo apt-get install -y minisign
          printf '%s' "$MINISIGN_KEY" > /tmp/minisign.key
          tarball="gyza-${GITHUB_REF_NAME}-linux-${{ matrix.arch }}.tar.gz"
          minisign -Sm "$tarball" -s /tmp/minisign.key
          rm -f /tmp/minisign.key
          ls -la "$tarball.minisig"
      - uses: actions/upload-artifact@v4
        with:
          name: gyza-onedir-${{ matrix.arch }}
          path: |
            gyza-*-linux-*.tar.gz
            gyza-*-linux-*.tar.gz.sha256
            gyza-*-linux-*.tar.gz.minisig

  # ---------------------------------------------------------------------
  # Collect all artifacts and publish a GitHub Release.
  # The release notes are auto-generated from commit messages between
  # the previous tag and this one; can be edited manually after publish.
  # ---------------------------------------------------------------------
  publish:
    name: publish github release
    needs: [build-daemon, build-wheel, build-onedir]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: flatten
        run: |
          mkdir -p release
          find artifacts -type f -exec cp -v {} release/ \;
          ls -la release/
      - name: publish
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          # Pre-1.0 tags get the "prerelease" flag automatically.
          prerelease: ${{ contains(github.ref_name, '-') || contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'rc') }}
